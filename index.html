<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projekt edukacyjny</title>

<style>

body{
margin:0;
background:#111;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* telefon */
.phone{
width:360px;
height:720px;
background:#f2f4f7;
border-radius:40px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,0.5);
position:relative;
}

/* splash screen */
.splash{
position:absolute;
width:100%;
height:100%;
background:#003a8f;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;
z-index:10;
}

/* header */
.header{
background:#003a8f;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.content{
padding:25px;
display:none;
}

.logo{
text-align:center;
font-size:26px;
color:#003a8f;
margin-bottom:25px;
font-weight:bold;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:15px;
background:#003a8f;
color:white;
border:none;
border-radius:14px;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

.notice{
display:none;
margin-top:20px;
background:#e6f4ff;
padding:15px;
border-radius:12px;
font-size:14px;
}

.loading{
display:none;
text-align:center;
margin-top:20px;
}

.spinner{
width:30px;
height:30px;
border:4px solid #ccc;
border-top:4px solid #003a8f;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="phone">

<div class="splash" id="splash">
mObywatel
</div>

<div class="header">mObywatel</div>

<div class="content" id="app">

<div class="logo">Logowanie</div>

<form id="eduForm">

<input placeholder="PESEL" required>
<input placeholder="Nazwisko rodowe matki" required>
<input type="password" placeholder="Kod dostępu" required>

<button type="submit">Zaloguj się</button>

</form>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Sprawdzanie danych...</p>
</div>

<div class="notice" id="msg">
✅ <b>To była symulacja edukacyjna.</b><br><br>
Ta strona pokazuje jak realistycznie mogą wyglądać
fałszywe aplikacje i strony logowania.<br><br>
Nigdy nie podawaj danych po kliknięciu podejrzanego linku.
</div>

</div>

</div>

<script>

/* ekran startowy */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("app").style.display="block";
},2000);

/* symulacja logowania */
document.getElementById("eduForm").addEventListener("submit",function(e){
e.preventDefault();

document.getElementById("loading").style.display="block";

setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("msg").style.display="block";
},2000);

});

</script>

</body>
</html>
